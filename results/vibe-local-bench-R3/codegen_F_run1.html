Hier is een voorbeeld van een basis HTML + JavaScript pagina met CSS-styling. Het laat zien hoe je:

1. **HTML-structuur** maakt
2. **JavaScript** toevoegt (zoals een alert of een functie)
3. **CSS** toepast (in het `<style>`-tag of in een `<link>`)

---

### 🌟 **1. HTML-structuur**
```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basisknoop HTML + JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>hallo wereld!</h1>
    <p>dit is een paragraaf.</p>
    <script src="script.js"></script>
</body>
</html>
```

---

### 🧩 **2. JavaScript (script.js)**
```javascript
console.log("JavaScript is actief!");

function maakAlert() {
    alert("Je hebt de pagina bezoekt!");
}
```

---

### 🎨 **3. CSS (styles.css)**
```css
body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    text-align: center;
    padding: 50px;
}

h1 {
    color: #333;
}

p {
    color: #666;
    font-size: 18px;
}
```

---

### 🧩 **4. Aanvullende functionaliteit**
- **Klikken op een knop**:  
  Voeg een knop toe en gebruik een `onclick`-handleur.
- **Voorbeeld:**
```html
<button onclick="maakAlert()">Klik op mij</button>
```

---

### 📦 **Hoe maak je deze pagina?**
1. Sla de code op als `index.html` (of `pagina.html`).
2. Open het bestand in een browser (bijv. Chrome, Firefox).
3. Je ziet de pagina en het JavaScript werkt in het console (in de browser).

---

### 📌 Tips
- Gebruik `console.log()` om JavaScript te testen.
- Voeg `id`'s of `class`'s toe aan HTML-elementen voor styling (bijv. `<div id="geen">`).
- Gebruik `addEventListener()` voor interactie (zoals klikken, drukken, scrollen).
